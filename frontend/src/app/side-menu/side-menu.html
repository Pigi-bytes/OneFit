<main>
    <div id="side-menu">
        <a routerLink="/accueil" class="brand-link">
            <img src="/img/icone_clair.png" alt="OneFit" class="brand-logo" />
            <span class="brand-title">OneFit</span>
        </a>

        <hr>

        <div class="menu-nav d-flex flex-column gap-2">
            <button class="btn btnGhostLarge" routerLink="/utilisateur" routerLinkActive="router-link-active">
                Mon profil <i class="bi bi-person-fill"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/routine" routerLinkActive="router-link-active">
                Mes routines <i class="bi bi-calendar-check"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/poid" routerLinkActive="router-link-active">
                Suivi du poids <i class="bi bi-activity"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/statistique" routerLinkActive="router-link-active">
                Mes performances <i class="bi bi-graph-up"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/carte" routerLinkActive="router-link-active">
                Salles à proximité <i class="bi bi-pin-map-fill"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/contact" routerLinkActive="router-link-active">
                Contactez-nous <i class="bi bi-mailbox-flag"></i>
            </button>
            <button class="btn btnGhostLarge" routerLink="/mentions-legales" routerLinkActive="router-link-active">
                Mentions légales <i class="bi bi-file-earmark-text"></i>
            </button>

        </div>

        <div class="bottom">
            <div class="theme-row">
                <span class="theme-label">
                    <i class="bi bi-moon-stars"></i> Mode sombre
                </span>
                <label class="switch">
                    <input type="checkbox" [checked]="isDark" (change)="toggleTheme()">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <hr>

        <button class="btn btnDanger" (click)="deconnexion()">
            <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
        </button>
    </div>
</main>
