<main class="d-flex">
    <section class="config-shell">
        <header>
            <h2>Configurer l'exercice</h2>
            <p>Ajuste rapidement les paramètres pour ta séance.</p>
        </header>

        <div class="config-preview card" *ngIf="exo">
            <h2>{{ exo?.name }}</h2>
            <img [src]="exo?.img_url" alt="{{ exo?.name }}" class="preview-image">
        </div>

        <div class="config-preview card empty" *ngIf="modifie && !exo">
            <p class="mb-0"> <i class="bi bi-cursor me-2"></i> Sélectionnez un exercice</p>
        </div>

        <form (ngSubmit)="action()" #loginForm="ngForm" id="login_form" class="config-form" *ngIf="idExo" [attr.data-key]="formKey">
            <div class="field-row">
                <label for="setNumber">Nombre de sets</label>
                <input type="number" id="setNumber" name="setNumber" [(ngModel)]="setNumber" required class="form-control" (click)="resetNotif()"/>
            </div>

            <div class="field-row">
                <label for="repNumber">Nombre de répétitions</label>
                <input type="number" id="repNumber" name="repNumber" [(ngModel)]="repNumber" required class="form-control" (click)="resetNotif()"/>
            </div>
 
            <div class="field-row">
                <label for= "poids">Poids</label>
                <input type="number" id="poids" name="poids" [(ngModel)]="poids" required class="form-control" (click)="resetNotif()"/>
            </div>

            <div class="action-row">
                <button type="submit" class="btn btnPrimaire">
                    <i class="bi bi-floppy"></i>
                    <span *ngIf="!modifie">Ajouter</span>
                    <span *ngIf="modifie">Modifier</span>
                </button>

                <button type="button" class="btn btnDanger" *ngIf="modifie" (click)="supprimer()">
                    <i class="bi bi-trash"></i> Supprimer
                </button>

                <button type="button" class="btn btnSecondaire" (click)="annuler()">Annuler</button>
            </div>
        </form>

        <div *ngIf="backendResponse" class="mt-2 alert alert-info w-100">
            {{ backendResponse }}
        </div>
    </section>
</main>
