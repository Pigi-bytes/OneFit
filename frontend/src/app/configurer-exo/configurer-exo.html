<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<main class="d-flex flex-column align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="max-width: 200px;" *ngIf="exo">

        <h5 class="text-center mb-4">{{ exo?.name }}</h5>

        <div class="text-center mb-4">
            <img [src]="exo?.img_url" alt="{{ exo?.name }}" class="img-fluid rounded" style="max-height: 150px;">
        </div>

    </div>

    <form (ngSubmit)="ajouter()" #loginForm="ngForm" id="login_form" class="d-flex flex-column gap-3 w-50">

        <table>
            <tr>
                <td>
                    <label for="setNumber">Nombre de sets :</label>
                </td>
                <td>
                    <input type="text" id="setNumber" name="setNumber"
                        [(ngModel)]="setNumber" required class="form-control"
                        (click)="resetNotif()" />
                </td>
            </tr>

            <tr>
                <td>
                    <label for="repNumber">Nombre de répétitions :</label>
                </td>
                <td>
                    <input type="text" id="repNumber" name="repNumber"
                        [(ngModel)]="repNumber" required class="form-control"
                        (click)="resetNotif()" />
                </td>
            </tr>

            <tr>
                <td>
                    <label for="poids">Poids :</label>
                </td>
                <td>
                    <input type="text" id="poids" name="poids"
                        [(ngModel)]="poids" required class="form-control"
                        (click)="resetNotif()" />
                </td>
            </tr>
        </table>

        <button type="submit" class="btn-principal">Ajouter</button>

        <button type="button" class="btn-principal" (click)="annuler()">Annuler</button>

    </form>

    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>

</main>
