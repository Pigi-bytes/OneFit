<main class="d-flex flex-column align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="max-width: 200px;" *ngIf="exo">

        <p class="h5 text-center mb-4">{{ exo?.name }}</p>

        <div class="text-center mb-4">
            <img [src]="exo?.img_url" alt="{{ exo?.name }}" class="img-fluid rounded" style="max-height: 150px;">
        </div>
    </div>

    <div class="card p-4" style="max-width: 600px;" *ngIf="modifie && !exo">
        <p class="text-center text-gray">
            <i class="text-center mb-4"></i> Sélectionnez un exercice
        </p>


    </div>

    <form (ngSubmit)="action()" #loginForm="ngForm" id="login_form" class="d-flex flex-column gap-3 w-50" *ngIf="idExo"
        [attr.data-key]="formKey">

        <table>
            <tr>
                <td>
                    <label for="setNumber">Nombre de sets :</label>
                </td>
                <td>
                    <input type="text" id="setNumber" name="setNumber" [(ngModel)]="setNumber" required
                        class="form-control" (click)="resetNotif()" />
                </td>
            </tr>

            <tr>
                <td>
                    <label for="repNumber">Nombre de répétitions :</label>
                </td>
                <td>
                    <input type="text" id="repNumber" name="repNumber" [(ngModel)]="repNumber" required
                        class="form-control" (click)="resetNotif()" />
                </td>
            </tr>

            <tr>
                <td>
                    <label for="poids">Poids :</label>
                </td>
                <td>
                    <input type="text" id="poids" name="poids" [(ngModel)]="poids" required class="form-control"
                        (click)="resetNotif()" />
                </td>
            </tr>
        </table>

        <button type="submit" class="btn btnPrimaire">
            <span *ngIf="!modifie">Ajouter</span>
            <span *ngIf="modifie">modifie</span>
        </button>

        <button type="button" class="btn btnDanger" *ngIf="modifie" (click)="supprimer()">supprimer</button>

        <button type="button" class="btn btnPrimaire" (click)="annuler()">Annuler</button>

    </form>

    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>

</main>
