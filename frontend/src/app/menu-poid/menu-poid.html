<section class="weight-menu-card">
    <form (ngSubmit)="ajouterPoid()" #loginForm="ngForm" id="signup_form" class="weight-form">

        <div class="form-group">
            <label for="pDate">Date de pesée :</label>
            <input type="date" id="pDate" name="pDate" [(ngModel)]="pDate" required class="form-control" (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="poid">Poids :</label>
            <input type="number" id="poid" name="poid" [(ngModel)]="poid" required class="form-control" (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="note">Note :</label>
            <input type="text" id="note" name="note" [(ngModel)]="note" required class="form-control" placeholder="Ex: Repas de famille" (click)="resetNotif()" />
        </div>

        <div class="actions">
            <button type="submit" class="btn btnPrimaire action-btn">
                <i class="bi bi-plus-lg"></i> Ajouter
            </button>
            <button type="button" class="btn btnDanger action-btn" (click)="supprimer()">
                <i class="bi bi-trash"></i> Supprimer
            </button>
        </div>
    </form>

    <div *ngIf="backendResponse" class="alert alert-info response-message">
        {{ backendResponse }}
    </div>
</section>
