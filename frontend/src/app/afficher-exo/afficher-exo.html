<main class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">

    <div class="card p-4" style="max-width: 600px;" *ngIf="!exo">
        <p class="text-center text-gray">
            <i class="text-center mb-4"></i> Sélectionnez un exercice
        </p>


    </div>
    <div class="card p-4" style="max-width: 600px;" *ngIf="message">
        <p class="text-center text-gray">
            <i class=" text-center mb-4"></i> {{message}}
        </p>

    </div>

    <div class="card p-4" style="max-width: 600px; overflow-y: auto; max-height: 80vh" *ngIf="exo">

        <h1 class="text-center mb-4">{{ exo?.name }}</h1>

        <div class="text-center mb-4">
            <img [src]="exo?.img_url" alt="{{ exo?.name }}" class="img-fluid rounded" style="max-height: 250px;">
        </div>

        <p class="text-center">
            {{ exo?.overview }}
        </p>

    </div>

</main>
