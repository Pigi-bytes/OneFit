<main class="creer-page">
    <div class="card creer-card">
        <img src="/img/onefit_logo_couleurs.png" class="imgLogo" alt="OneFit">
        <h1>Créer un compte</h1>

        <form (ngSubmit)="creer()" #loginForm="ngForm" id="signup_form" class="formCreerCompte">
            <div class="creer-input-group">
                <label class="input-label" for="username">Nom d'utilisateur</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="input-field"
                    placeholder="Ex: Jean Dupont"
                    [(ngModel)]="username"
                    required
                    (click)="resetNotif()"
                >
            </div>

            <div class="creer-input-group">
                <label class="input-label" for="password">Mot de passe</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="input-field"
                    placeholder="*******"
                    [(ngModel)]="password"
                    required
                    (click)="resetNotif()"
                >
            </div>

            <div class="creer-input-group">
                <label class="input-label" for="confirmPassword">Confirmer le mot de passe</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    class="input-field"
                    placeholder="*******"
                    [(ngModel)]="confirmPassword"
                    required
                    (click)="resetNotif()"
                >
            </div>

            <div class="button-group">
                <button type="button" class="btn btnSecondaire" routerLink="/">
                    <i class="bi bi-arrow-left"></i> Retour
                </button>

                <button type="submit" class="btn btnPrimaire">
                    <i class="bi bi-person-plus"></i> Créer un compte
                </button>
            </div>
        </form>

        <div *ngIf="backendResponse" class="mt-2 alert alert-info">
            {{ backendResponse }}
        </div>
    </div>
</main>
