<main class="carousel-container">

    <h1> Routines préfaites </h1>
    <ngb-carousel #carousel="ngbCarousel" class="card" (slide)="slideChanged()">
        @for(routine of routines; track routine) {
            <ng-template ngbSlide [id]="routine.id">
                <div class="p-4 carousel-item-content">
                    <h2>{{ routine.name }}</h2>
                    <p>{{ routine.description }}</p>
                    <p class="text-gray">Jours de repos: {{ 7 - routine.activeDays}}</p>
                </div>
            </ng-template>
        }
    </ngb-carousel>

    <div class="mt-3 button-group">
        <button class="btn btnPrimaire" (click)="ajouterRoutine(carousel)">
            <i class="bi bi-plus-lg"></i>
            Ajouter
        </button>
        <button class="btn btnPrimaire" routerLink="/routine">
            <i class="bi bi-arrow-left"></i>
            Retour
        </button>
    </div>

    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>
</main>
