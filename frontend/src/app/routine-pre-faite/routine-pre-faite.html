<main class="carousel-container">
    <ngb-carousel #carousel="ngbCarousel" class="card" (slide)="slideChanged()">
        <ng-template ngbSlide id="1">
            <div class="card">
                <h2>DwarfMaxingUltraXX</h2>
                <p>Contenu 1...</p>
            </div>
        </ng-template>

        <ng-template ngbSlide id="2">
            <div class="card">
                <h2>OneFitMan</h2>
                <p>Contenu 2...</p>
            </div>
        </ng-template>

        <ng-template ngbSlide id="3">
            <div class="card">
                <h2>GirlyPop</h2>
                <p>Contenu 3...</p>
            </div>
        </ng-template>

        <ng-template ngbSlide id="4">
            <div class="card">
                <h2>Débutant</h2>
                <p>Contenu 3...</p>
            </div>
        </ng-template>
    </ngb-carousel>

    <div class="mt-3">
        <button class="btn btnPrimaire" (click)="ajouterRoutine(carousel)">Ajouter</button>
        <button class="btn btnPrimaire" routerLink="/routine">retour</button>
    </div>

    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>
</main>
