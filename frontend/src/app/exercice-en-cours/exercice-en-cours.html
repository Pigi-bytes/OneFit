<main class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">
	<!-- Chrono -->
	<app-chrono class="w-100"></app-chrono>

	<form (ngSubmit)="validerExo()">

		<div class="card p-4 w-100 mx-auto" *ngIf="exo">
			<div class="row g-4">
				<!-- image de lexo et nom de l'exo-->
				<div class="col-md-5 text-center d-flex flex-column align-items-center justify-content-center">
					<img [src]="exo?.img_url" alt="{{ exo?.name }}" class="img-fluid rounded mb-2">
					<div class="d-flex align-items-center gap-2">
						<h2 class="fw-bold m-0">{{ exo?.name }}</h2>

						<!-- bouton aide exo-->
						<button type="button" class="btn btnPrimaire btnIcon" (click)="openModal(exo?.id)">
							<i class="bi bi-info-circle"></i>
						</button>
						<app-aide-exo [(isOpen)]="isModalOpen">
							<h2 class="mb-4"> <span class="fw-bold">Instructions</span> - {{ exo?.name }}</h2>
							<div class="content">
								@if (exoInfo.video_url) {
								<video controls width="100%">
									<source [src]="exoInfo.video_url" type="video/mp4">
								</video>}
								<p class="p-4">{{exoInfo.instructions}}</p>
							</div>
						</app-aide-exo>

					</div>
				</div>

				<!-- form sets -->
				<div class="col-md-7">

					<div>
						<!-- titre sets -->
						<h2 class="mb-3 fw-bold">Sets effectués</h2>
					</div>

					<div class="card p-4" style="overflow-y: auto; max-height: 60vh;">
						<!-- Liste des sets -->
                         @for (i of range(exo.planned_sets); track i) {
                        <div class="row align-items-center g-2 mb-2">
							<!-- numéro -->
							<div class="col-2 fw-semibold text-center set-number"> Set {{ i }}
							</div>
							<!-- reps -->
							<div class="col-4 d-flex">
								<input type="number" class="form-control text-center" [(ngModel)]="setsValides[i-1].reps" name="reps{{i}}" [placeholder]="exo.planned_reps">
								<span class="input-group-text">réps</span>
							</div>
							<!-- poids -->
							<div class="col-4 d-flex">
								<input type="number" class="form-control text-center" [(ngModel)]="setsValides[i-1].weight" name="weight{{i}}" [placeholder]="exo.planned_weight">
								<span class="input-group-text">kg</span>
							</div>
							<!-- bouton supprimer set -->
							 @if (i >= exo.planned_sets) {
							<div class="col-1 text-center">
								<button type="button" class="btn btnDanger btnIcon" (click)="supprimerSet()">
									<i class="bi bi-x-lg"></i>
								</button>
							</div> 
							<!-- bouton ajouter set -->
							<div class="col-1 text-center">
								<button type="button" class="btn btnPrimaire btnIcon" (click)="ajouterSet()" >
									<i class="bi bi-plus-lg"></i>
								</button>
							</div> }
							
						</div> }

					</div>
				</div>
			</div>
		</div>

		<!-- bouton valider -->
		<div class="text-center p-3">
			<button type="submit" class="btn btnPrimaire px-4 w-auto">
				<i class="bi bi-check-lg"></i>
				Valider
			</button>
		</div>

	</form>

</main>
