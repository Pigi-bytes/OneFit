<main class="poid-page">

    <h1>Mes performances</h1>

    <section class="card poid-graph-section">
        <div class="crad chart-area">

            <div class="chart-main">
                <p class="h5 p-2">{{ titreGraphe }}</p>
                <div class="card chart-box" [class.empty]="!afficheGraphe">
                    <canvas #myChart *ngIf="afficheGraphe"></canvas>
                    <p *ngIf="!afficheGraphe && !manqueType">Sélectionnez un exercice</p>
                    <p *ngIf="!afficheGraphe && manqueType">Sélectionnez un type de graphe</p>
                </div>
            </div>

            <div class="chart-right">
                <div *ngIf="exercices.length > 0">
                    <select [(ngModel)]="exoChoisit" name="exercices" (ngModelChange)="resetRadio()">
                        <option value="" disabled selected>Choisir un exercice</option>
                        <option *ngFor="let exo of exercices" [value]="exo.exoId">{{ exo.name }}</option>
                    </select>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="type" [(ngModel)]="typeChoisit" [value]="1"
                                (change)="getInformation(1)" />
                            <span>Volume total</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="type" [(ngModel)]="typeChoisit" [value]="2"
                                (change)="getInformation(2)" />
                            <span>1RM</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="type" [(ngModel)]="typeChoisit" [value]="3"
                                (change)="getInformation(3)" />
                            <span>Poids max.</span>
                        </label>
                    </div>
                </div>
                <p *ngIf="exercices.length === 0">Aucun exercice réalisé</p>
            </div>

        </div>
    </section>

    @if(exercices.length > 0) {
    <section class="card poid-description">
        <h4 class="titre">Description</h4>
        <p>{{ description }}</p>
    </section>
    }

</main>
