<main class="home-page">
	<div class="card home-card">
		<img [src]="isDark ? '/img/onefit_logo_clair.png' : '/img/onefit_logo_couleurs.png'" class="imgLogo" alt="OneFit">
		<h1>Bienvenue sur OneFit</h1>
		<h2>Atteignez vos objectifs en One Day</h2>

		<div class="button-group home-actions">
			<button class="btn btnSecondaire" routerLink="/connexion">
				<i class="bi bi-person"></i> Connexion
			</button>

			<button class="btn btnPrimaire" routerLink="/creer-compte">
				<i class="bi bi-person-plus"></i> Créer un compte
			</button>
		</div>
	</div>
</main>
