<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


<main>

    <div class="vbox">
        <div id="map"></div>
        <div id="controls" class="hbox">

            <form (ngSubmit)="trouverLoc()" #loginForm="ngForm" id="signup_form" class="d-flex flex-column gap-3 w-50">
                <div class="form-group">
                    <label for="ville">Ville:</label>
                    <input type="text" id="ville" name="ville" [(ngModel)]="ville" required class="form-control"
                        (click)="resetNotif()" />
                </div>

            </form>
            <div *ngIf="backendResponse" class="mt-2 alert alert-info">
                {{ backendResponse }}
            </div>

            <button type="submit" class="btn-principal">Trouver Lieu</button>
            <button type="button" class="btn-principal" (click)="findByLoc()">afficher salle</button>
            <button type="button" class="btn-principal" routerLink="/accueil">Revenir</button>
        
        </div>
    </div>

</main>
