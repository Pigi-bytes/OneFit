<main class="p-3 d-flex justify-content-center align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center align-items-center g-4">

            <!-- carte -->
            <div class="col-12 col-lg-7 d-flex justify-content-center">
                <div class="card w-100">
                    <div class="card-body p-0">
                        <div id="map" style="height: 80vh; width: 100%;"></div>
                    </div>
                </div>
            </div>

            <!-- controles -->
            <div class="col-12 col-lg-4 d-flex justify-content-center">
                <div id="controls" class="card w-100">

                    <div class="card-body">
                        <form (ngSubmit)="trouverLoc()" #loginForm="ngForm" id="signup_form"
                              class="d-flex flex-column gap-3">
                            
                            <div class="form-group">
                                <h2 class="fw-bold text-center">Trouver une salle</h2>
                                <input type="text" id="ville" name="ville" [(ngModel)]="ville" required
                                       class="form-control"
                                       (click)="resetNotif()"
                                       placeholder="Entrez une ville..." />
                            </div>
                            
                            <div class="d-flex justify-content-between gap-2">
                                <button type="submit" class="btn btnPrimaire w-100">
                                    <i class="bi bi-map"></i>
                                    Aller à
                                </button>
                                <button type="button" class="btn btnPrimaire w-100" (click)="findByLoc()">
                                    <i class="bi bi-arrow-down"></i>
                                    Trouver ici
                                </button>
                            </div>
                            
                        </form>

                        <div *ngIf="backendResponse" class="mt-3 alert alert-info text-center">
                            {{ backendResponse }}
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</main>
