<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<main class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3 bg-light">

    <div class="card shadow-sm p-4 text-center" style="max-width: 600px; width:100%;" *ngIf="!seances">
        <p class="text-muted mb-0">
            Sélectionnez une routine
        </p>
    </div>

    <div class="card shadow-sm p-4" style="max-width: 600px; width:100%;" *ngIf="seances">

        <div *ngFor="let s of seances"
             class="card border-0 shadow-sm mb-3 p-3 d-flex flex-row align-items-center">

            <div class="d-flex justify-content-between align-items-center w-100">
                <p class="mb-0 fw-semibold">{{ s.title }}</p>
            </div>

        </div>

    </div>

</main>
