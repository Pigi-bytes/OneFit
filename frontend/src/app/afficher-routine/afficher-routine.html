<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


<main class="d-flex flex-column p-3">

    <div class="card p-4" style="max-width: 600px;" *ngIf="!seances">
        <p class="text-center text-muted">
            <i class="text-center mb-4"></i> Sélectionnez une routine
        </p>
    </div>

    <div class="card p-4" style="max-width: 600px;" *ngIf="seances">

        <div *ngFor="let s of seances" class="card d-flex flex-row align-items-center p-2">

                <div class="d-flex justify-content-between align-items-center w-100">
                    <p>{{ s.title }}</p>
                </div>

        </div>

    </div>

</main>
