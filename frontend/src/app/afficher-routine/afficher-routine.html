<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<main class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3 bg-light">

    <div class="card shadow-sm p-4 text-center" style="max-width: 600px; width:100%;" *ngIf="!seances">
        <p class="text-muted mb-0">
            Sélectionnez une routine
        </p>

    </div>

        <div class="card shadow-sm p-4" style="max-width: 600px; width:100%;" *ngIf="seances">

        <div *ngFor="let s of seances" class="card border-0 shadow-sm mb-3 p-3">
            <p class="mb-2 fw-bold">{{ s.title }}</p>

            <ul class="list-group list-group-flush">
                <li class="list-group-item border-0 py-1" *ngFor="let exo of s.exercises">
                    {{ exo.name }}
                </li>
            </ul>
        </div>

        <div class="button-group">
            <button class="btn-principal" (click)="activerRoutine()">Activer cette routine</button>
            <button class="btn-red" (click)="supprimerRoutine()">Supprimer</button>
        </div>

    </div>


</main>
