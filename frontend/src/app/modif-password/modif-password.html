<main class="d-flex flex-column align-items-center justify-content-center min-vh-100">
    <form (ngSubmit)="modif()" #loginForm="ngForm" id="signup_form" class="d-flex flex-column gap-3 w-50">
        <div class="form-group">
            <label for="oldPassword">Mot de passe:</label>
            <input type="password" id="oldPassword" name="oldPassword" [(ngModel)]="oldPassword" required
                class="form-control" (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="password">Nouveau mot de passe:</label>
            <input type="password" id="password" name="password" [(ngModel)]="password" required class="form-control"
                (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirmer le mot de passe:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                class="form-control" (click)="resetNotif()" required />
        </div>

        <button type="submit" class="btn btnPrimaire">
            <i class="bi bi-pencil"></i>
            Modifier
        </button>

        <button type="button" class="btn btnPrimaire" routerLink="/utilisateur">
            <i class="bi bi-arrow-left"></i>
            Retour
        </button>

    </form>




    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>
</main>
