<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<main class="d-flex flex-column align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="max-width: 600px;" *ngIf="!exo">
        <p class="text-center text-gray">
            <i class="text-center mb-4"></i> Sélectionnez un exercice
        </p>


    </div>

    <form *ngIf="exo" (ngSubmit)="modifier()" #loginForm="ngForm" id="login_form" class="d-flex flex-column gap-3 w-50">

        <div class="form-group">
            <label for="setNumber">Nombre de sets :</label>
            <input type="text" id="setNumber" name="setNumber" [(ngModel)]="setNumber" required class="form-control"
                (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="repNumber">Nombre de répétitions :</label>
            <input type="text" id="repNumber" name="repNumber" [(ngModel)]="repNumber" required class="form-control"
                (click)="resetNotif()" />
        </div>

        <div class="form-group">
            <label for="poids">Poids :</label>
            <input type="text" id="poids" name="poids" [(ngModel)]="poids" required class="form-control"
                (click)="resetNotif()" />
        </div>



        <button type="submit" class="btn-principal">Modifier</button>

        <button type="button" class="btn-red" (click)="supprimer()">Supprimer</button>
        <button type="button" class="btn-principal" (click)="annuler()">Annuler</button>

    </form>

    <div *ngIf="backendResponse" class="mt-2 alert alert-info">
        {{ backendResponse }}
    </div>

</main>
