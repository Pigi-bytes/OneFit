<main class="card">

    <div class="page-container ">

        <h1 class="titreRecap">Bien joué, {{ name }} !</h1>

        <div class="chrono card">
            <p>Temps</p>
            <app-chrono></app-chrono>
        </div>

        <div class="streak card">
            <p>Streak</p>
            <p>Votre streak est de {{streak}} jour(s) </p>
        </div>

        <div class="recap card" style="max-width: 600px; overflow-y: auto; max-height: 80vh">
            <p>Exercices effectués</p>
            <div *ngFor="let exo of exercices;let i = index">

                <!-- exo info -->
                <div>
                    <div class="d-flex align-items-center p-3">
                        <img [src]="exo.img_url" alt="{{exo.nom}}" width="20%" class="me-3 rounded">
                        <p class="mb-0">{{ exo.name }} </p>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btnPrimaire btnRecap" (click)="terminer()">
            Super
            <i class="bi bi-check-lg"></i>
        </button>
    </div>



</main>
