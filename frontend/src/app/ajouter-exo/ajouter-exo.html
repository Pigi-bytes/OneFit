<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


<main class="d-flex flex-column p-3">

    <h1>Ajoutez des exercices à votre séance</h1>

    <form (ngSubmit)="trouverExo()" #loginForm="ngForm" id="signup_form" class="d-flex flex-column gap-3 w-50 mb-4"
        style="flex-shrink: 0;">
        <div class="form-group">
            <label for="nom">nom exercice:</label>
            <input type="text" id="nom" name="nom" [(ngModel)]="nom" required class="form-control"
                (click)="resetNotif()" />
        </div>
        <button type="submit" class="btn-principal">Rechercher</button>
        <button type="button" class="btn-principal" routerLink="/affiche-seance">retour</button>
    </form>

    <div class="d-flex flex-column gap-3 w-50" style="overflow-y: auto; max-height: 60vh;">
        <div *ngFor="let exo of exercices" class="card clickable-card d-flex flex-row align-items-center p-2"
            (click)="AfficherInfosExo(exo.id)">

            <img [src]="exo.image" alt="{{exo.nom}}" width="80" class="me-3 rounded">

            <div class="d-flex justify-content-between align-items-center w-100">
                <p>{{ exo.nom }}</p>
                <button type=" button" class="btn btn-success" (click)="ajouterExo(exo.id); $event.stopPropagation()">
                    Add
                </button>
            </div>

        </div>
    </div>

</main>
