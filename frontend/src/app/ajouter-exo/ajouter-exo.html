<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


<main class="d-flex flex-column align-items-center justify-content-center min-vh-100">

    <form (ngSubmit)="trouverExo()" #loginForm="ngForm" id="signup_form" class="d-flex flex-column gap-3 w-50">
        <div class="form-group">
            <label for="nom">nom exercice:</label>
            <input type="text" id="nom" name="nom" [(ngModel)]="nom" required class="form-control"
                (click)="resetNotif()" />
        </div>


        <button type="submit" class="btn-principal">Suivant</button>

    </form>

    <div class="d-flex flex-column gap-3 w-50">
        <div *ngFor="let exo of exercices" class="card d-flex flex-row align-items-center p-2"
            (click)="AfficherInfosExo()">

            <img [src]="exo.image" alt="{{exo.nom}}" width="80" class="me-3 rounded">

            <div class="d-flex justify-content-between align-items-center w-100">
                <p class="nomExo">{{ exo.nom }}</p>
                <button type="button" class="btn btn-success" (click)="ajouterExo(exo.id)">
                    Add
                </button>
            </div>

        </div>
    </div>

</main>
