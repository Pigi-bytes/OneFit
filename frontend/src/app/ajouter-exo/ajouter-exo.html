<main class="d-flex flex-column p-3">

    <h1 class="mb-4">Ajoutez des exercices à votre séance</h1>

    <div class="mb-4 mx-auto">
        <form (ngSubmit)="trouverExo()" class="d-flex flex-column gap-3 mb-4" style="flex-shrink: 0;">
            <div class="form-group">
                <div class="d-flex gap-2">
                    <input type="text" id="nom" name="nom" [(ngModel)]="nom" required class="form-control"
                        (click)="resetNotif()" placeholder="Tapez un exercice..." />
                    <button type="submit" class="btn btnPrimaire">Rechercher</button>
                </div>
            </div>
        </form>
    </div>


    <div class="d-flex flex-column gap-3 w-50" style="overflow-y: auto; overflow-x: hidden; max-height: 40vh;">
        <div *ngFor="let exo of exercices"
            class="card clickable-card d-flex flex-row align-items-center p-2 justify-content-between w-100">

            <div (click)="AfficherInfosExo(exo.id);" tooltip>
                <span class="tooltiptext">Voir l'exercice</span>

                <div class="d-flex align-items-center p-2">
                    <img [src]="exo.image" alt="{{exo.nom}}" width="20%" class="me-3 rounded">
                    <p class="mb-0">{{ exo.nom }}</p>
                </div>
            </div>

            <button class="btn btn-principal " (click)="ajouterExo(exo.id); $event.stopPropagation()" tooltip>
                <span class="tooltiptext">Ajouter l'exercice</span>
                +
            </button>

        </div>
    </div>

    <div class="button-group">
        <button type="button" class="btn btnPrimaire" routerLink="/seance">Retour</button>
    </div>

</main>
