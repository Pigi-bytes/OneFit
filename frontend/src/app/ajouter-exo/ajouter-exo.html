<main class="d-flex flex-column p-3">

    <h1 class="mb-4">Ajoutez des exercices à votre séance</h1>

    <div class="mb-4 mx-auto">
        <form (ngSubmit)="trouverExo()" class="d-flex flex-column gap-3 mb-4" style="flex-shrink: 0;">
            <div class="form-group">
                <div class="d-flex gap-2">
                    <input type="text" id="nom" name="nom" [(ngModel)]="nom" required class="form-control"
                        (click)="resetNotif()" placeholder="Tapez un exercice..." />
                    <button type="submit" class="btn-principal">Rechercher</button>
                </div>
            </div>
        </form>
    </div>


    <div class="d-flex flex-column gap-3 w-50" style="overflow-y: auto; max-height: 60vh;">
        <div *ngFor="let exo of exercices" class="card clickable-card d-flex flex-row align-items-center p-2"
            (click)="AfficherInfosExo(exo.id)" tooltip>

            <span class="tooltiptext">Cliquez pour voir l'exercice</span>

            <img [src]="exo.image" alt="{{exo.nom}}" width="80" class="me-3 rounded">

            <div class="d-flex justify-content-between align-items-center w-100">
                <p>{{ exo.nom }}</p>
                <button class="btn btn-success" (click)="ajouterExo(exo.id); $event.stopPropagation()">
                    Add
                </button>
            </div>

        </div>
    </div>

    <div class="button-group">
        <button type="button" class="btn-principal" routerLink="/seance">Retour</button>
    </div>

</main>
